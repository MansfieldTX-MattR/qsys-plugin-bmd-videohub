name: Build QPlug

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      nuget_release:
        description: 'Whether to create a release and publish to NuGet'
        type: boolean
        required: false
        default: false


jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Run plugin compiler
      run: .\plugincompile\PLUGCC.exe "${{ github.event.repository.name }}" "${{ github.workspace }}\plugin.lua"
      shell: cmd

    - name: Upload compiled plugin
      uses: actions/upload-artifact@v7
      with:
        name: compiled-plugin
        path: ./*.qplug

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download compiled plugin
      uses: actions/download-artifact@v7
      with:
        name: compiled-plugin

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./*.qplug

  nuget:
    needs: build
    if: ${{ github.event.inputs.nuget_release }}
    runs-on: windows-latest
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job

    steps:
    - uses: actions/checkout@v6

    - name: Download compiled plugin
      uses: actions/download-artifact@v7
      with:
        name: compiled-plugin

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: .python-version

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Python dependencies
      run: |
        uv venv
        uv pip install -r requirements.in

    - name: Update nuspec from info.lua
      run: uv run python scripts/update_nuspec_from_info.py update-nuspec

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Pack NuGet package
      run: nuget pack package.nuspec -OutputDirectory ./nupkg

    - name: Upload NuGet package artifact
      uses: actions/upload-artifact@v7
      with:
        name: nuget-package
        path: ./nupkg/*.nupkg

    # Get a short-lived NuGet API key
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}

    # Push the package
    - name: NuGet push
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
      shell: bash

  sleet:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: windows-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      SLEET_FEED_TYPE: local
      SLEET_FEED_PATH: ${{ github.workspace }}/feed

    steps:
    - uses: actions/checkout@v6

    - name: Download compiled plugin
      uses: actions/download-artifact@v7
      with:
        name: compiled-plugin

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: .python-version

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Python dependencies
      run: |
        uv venv
        uv pip install -r requirements.in

    - name: Update nuspec from info.lua
      run: uv run python scripts/update_nuspec_from_info.py update-nuspec

    - name: Setup .NET
      uses: actions/setup-dotnet@v4

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Pack NuGet package
      run: nuget pack package.nuspec -OutputDirectory ./nupkg

    - name: Install Sleet
      run: dotnet tool install --global sleet

    - name: Fetch existing feed
      id: fetch-feed
      uses: actions/checkout@v6
      with:
        ref: gh-pages
        path: feed
      continue-on-error: true

    - name: Remove git metadata from feed
      if: steps.fetch-feed.outcome == 'success'
      run: rm -rf feed/.git
      shell: bash

    - name: Create feed directory
      if: steps.fetch-feed.outcome != 'success'
      run: mkdir -p feed
      shell: bash

    - name: Initialize Sleet feed
      if: steps.fetch-feed.outcome != 'success'
      run: sleet init --config none

    - name: Push package to Sleet feed
      run: sleet push (Get-Item ./nupkg/*.nupkg) --config none --skip-existing

    - name: Disable Jekyll processing
      run: touch feed/.nojekyll
      shell: bash

    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: feed

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
