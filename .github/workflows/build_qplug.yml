name: Build QPlug

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      nuget_release:
        description: 'Whether to create a release and publish to NuGet'
        type: boolean
        required: false
        default: false


jobs:
  test:
    runs-on: ubuntu-latest
    container: akorn/luarocks:lua5.1-alpine
    steps:
    - name: Update Git
      run: apk update && apk add -u git
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Install dependencies
      run: luarocks install telescope

    - name: Run tests
      run: tsc -f tests/*.lua
      env:
        TEST_ENV: "1"

  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Run plugin compiler
      run: .\plugincompile\PLUGCC.exe "${{ github.event.repository.name }}" "${{ github.workspace }}\plugin.lua"
      shell: cmd

    - name: Upload compiled plugin
      uses: actions/upload-artifact@v7
      with:
        name: compiled-plugin
        path: ./*.qplug

  release:
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download compiled plugin
      uses: actions/download-artifact@v8
      with:
        name: compiled-plugin

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: ./*.qplug


  sleet:
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Download compiled plugin
      uses: actions/download-artifact@v8
      with:
        name: compiled-plugin

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: .python-version

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Python dependencies
      run: |
        uv venv
        uv pip install -r requirements.in

    - name: Update nuspec from info.lua
      run: uv run python scripts/update_nuspec_from_info.py update-nuspec

    - name: Setup .NET
      uses: actions/setup-dotnet@v5

    - name: Install Mono
      run: sudo apt-get install -y mono-complete

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Pack NuGet package
      run: nuget pack package.nuspec -OutputDirectory ./nupkg

    - name: Install Sleet
      run: dotnet tool install --global sleet

    - name: Create Sleet config
      run: |
        cat > sleet.json << EOF
        {
          "sources": [
            {
              "name": "feed",
              "type": "local",
              "path": "$GITHUB_WORKSPACE/feed",
              "baseURI": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
            }
          ]
        }
        EOF

    - name: Fetch existing feed
      id: fetch-feed
      uses: actions/checkout@v6
      with:
        ref: gh-pages
        path: feed
      continue-on-error: true

    - name: Remove git metadata from feed
      if: steps.fetch-feed.outcome == 'success'
      run: rm -rf feed/.git

    - name: Create feed directory
      if: steps.fetch-feed.outcome != 'success'
      run: mkdir -p feed

    - name: Initialize Sleet feed
      if: steps.fetch-feed.outcome != 'success'
      run: sleet init --config sleet.json --source feed

    - name: Push package to Sleet feed
      run: sleet push ./nupkg/*.nupkg --config sleet.json --source feed --skip-existing

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./feed
        enable_jekyll: false
