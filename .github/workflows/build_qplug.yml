name: Build QPlug

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release:
        description: 'Whether to create a release and publish to NuGet (if tag starts with v)'
        type: boolean
        required: false
        default: false


jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Run plugin compiler
      run: .\plugincompile\PLUGCC.exe "${{ github.event.repository.name }}" "${{ github.workspace }}\plugin.lua"
      shell: cmd

    - name: Upload compiled plugin
      uses: actions/upload-artifact@v7
      with:
        name: compiled-plugin
        path: ./*.qplug

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download compiled plugin
      uses: actions/download-artifact@v7
      with:
        name: compiled-plugin

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./*.qplug

  nuget:
    needs: build
    if: ${{ github.event.inputs.release }}
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Download compiled plugin
      uses: actions/download-artifact@v7
      with:
        name: compiled-plugin

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: .python-version

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Python dependencies
      run: |
        uv venv
        uv pip install -r requirements.in

    - name: Update nuspec from info.lua
      run: uv run python scripts/update_nuspec_from_info.py

    # Get a short-lived NuGet API key
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}

    # Push the package
    - name: NuGet push
      run: dotnet nuget push artifacts/my-sdk.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
